spring.application.name=NestBites

# Loads application-secrets.properties if it exists locally (for dev
# machines) — this file is git-ignored and never pushed to GitHub.
# On a real server, you set real environment variables instead and
# this import is simply skipped ("optional:").
spring.config.import=optional:file:./application-secrets.properties

# ==========================
# Server
# ==========================
server.port=${PORT:8081}

# ==========================
# MongoDB
# ==========================
# Set MONGODB_URI as a real environment variable on your host
# (Render/Railway/EC2/etc). Never put the real connection string here.
spring.data.mongodb.uri=${MONGODB_URI}

# ==========================
# JWT
# ==========================
# Set JWT_SECRET as an environment variable — generate a long random
# string, e.g.: openssl rand -base64 48
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# ==========================
# Razorpay
# ==========================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ==========================
# Cloudinary
# ==========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================
# Swagger
# ==========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ==========================
# Actuator — only expose health, nothing else, and hide details from
# the public. Full exposure (env, beans, heapdump, etc.) is a data leak.
# ==========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.info.env.enabled=false

# ==========================
# Logging
# ==========================
logging.level.org.springframework=INFO
logging.level.homies.com.backend=INFO
